<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ashoo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">Ashoo</h1>
                <button class="favorites-btn" onclick="showFavorites()">
                    <svg class="heart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                    <span class="favorites-count">0</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Home/Catalog Screen -->
            <div id="screen-catalog" class="screen active">
                <div class="catalog-header">
                    <h2>Каталог</h2>
                    <span class="models-count">6 моделей</span>
                </div>
                <div class="models-grid" id="models-grid">
                    <!-- Models rendered by JS -->
                </div>
            </div>

            <!-- Model Detail Screen -->
            <div id="screen-detail" class="screen">
                <button class="back-btn" onclick="goBack()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"></path>
                    </svg>
                    <span>Назад</span>
                </button>
                
                <div class="model-detail-card">
                    <!-- Swiper -->
                    <div class="swiper-container">
                        <div class="swiper-wrapper" id="swiper-wrapper">
                            <!-- Slides rendered by JS -->
                        </div>
                        <div class="swiper-pagination"></div>
                        <button class="favorite-heart" onclick="toggleFavoriteCurrent()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                            </svg>
                        </button>
                    </div>

                    <div class="model-info">
                        <div class="model-header">
                            <div>
                                <h2 id="detail-name">Имя</h2>
                                <span class="model-age" id="detail-age">0 лет</span>
                            </div>
                            <div class="health-badge" id="detail-health">
                                <span class="health-icon">✓</span>
                                <span>Здоровье проверено</span>
                            </div>
                        </div>

                        <div class="model-section">
                            <h3>Основные услуги</h3>
                            <p id="detail-services">-</p>
                        </div>

                        <div class="model-section">
                            <h3>Дополнительно</h3>
                            <p id="detail-extras">-</p>
                        </div>

                        <div class="model-section">
                            <h3>Параметры</h3>
                            <div class="params-grid">
                                <div class="param-item">
                                    <span class="param-label">Рост</span>
                                    <span class="param-value" id="detail-height">-</span>
                                </div>
                                <div class="param-item">
                                    <span class="param-label">Вес</span>
                                    <span class="param-value" id="detail-weight">-</span>
                                </div>
                                <div class="param-item">
                                    <span class="param-label">Грудь</span>
                                    <span class="param-value" id="detail-bust">-</span>
                                </div>
                            </div>
                        </div>

                        <div class="model-section">
                            <h3>О себе</h3>
                            <p id="detail-about">-</p>
                        </div>

                        <div class="price-section">
                            <div class="price-item">
                                <span class="price-label">1 час</span>
                                <span class="price-value" id="price-1h">-</span>
                            </div>
                            <div class="price-item">
                                <span class="price-label">2 часа</span>
                                <span class="price-value" id="price-2h">-</span>
                            </div>
                            <div class="price-item">
                                <span class="price-label">Ночь</span>
                                <span class="price-value" id="price-night">-</span>
                            </div>
                        </div>

                        <button class="order-btn" onclick="orderModel()">
                            Заказать
                        </button>
                    </div>
                </div>
            </div>

            <!-- Profile Screen -->
            <div id="screen-profile" class="screen">
                <div class="profile-card">
                    <div class="profile-avatar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <div class="profile-info">
                        <h3 id="profile-name">Гость</h3>
                        <p id="profile-username">@username</p>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-value" id="stat-balance">0 ₽</span>
                        <span class="stat-label">Баланс</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" id="stat-orders">0</span>
                        <span class="stat-label">Заказы</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" id="stat-favorites">0</span>
                        <span class="stat-label">Избранное</span>
                    </div>
                </div>

                <div class="menu-list">
                    <button class="menu-item" onclick="navigateTo('topup')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="5" width="20" height="14" rx="2"></rect>
                            <line x1="2" y1="10" x2="22" y2="10"></line>
                        </svg>
                        <span>Пополнить баланс</span>
                        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18l6-6-6-6"></path>
                        </svg>
                    </button>
                    <button class="menu-item" onclick="showFavorites()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                        <span>Избранное</span>
                        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18l6-6-6-6"></path>
                        </svg>
                    </button>
                    <button class="menu-item" onclick="showSupport()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                        </svg>
                        <span>Поддержка</span>
                        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18l6-6-6-6"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Topup Screen -->
            <div id="screen-topup" class="screen">
                <div class="topup-card">
                    <span class="topup-label">Текущий баланс</span>
                    <span class="topup-amount" id="topup-balance">0 ₽</span>
                </div>

                <h3 class="section-title">Выберите сумму</h3>
                <div class="amount-grid">
                    <button class="amount-btn" data-amount="1000" onclick="selectAmount(1000)">
                        <span class="amount-number">1000</span>
                        <span class="amount-currency">₽</span>
                    </button>
                    <button class="amount-btn" data-amount="3000" onclick="selectAmount(3000)">
                        <span class="amount-number">3000</span>
                        <span class="amount-currency">₽</span>
                    </button>
                    <button class="amount-btn" data-amount="5000" onclick="selectAmount(5000)">
                        <span class="amount-number">5000</span>
                        <span class="amount-currency">₽</span>
                    </button>
                    <button class="amount-btn" data-amount="10000" onclick="selectAmount(10000)">
                        <span class="amount-number">10000</span>
                        <span class="amount-currency">₽</span>
                    </button>
                </div>

                <button class="submit-btn" onclick="submitTopup()">
                    Пополнить
                </button>
            </div>

            <!-- Favorites Screen -->
            <div id="screen-favorites" class="screen">
                <button class="back-btn" onclick="goBack()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"></path>
                    </svg>
                    <span>Назад</span>
                </button>
                <h2 class="screen-title">Избранное</h2>
                <div class="models-grid" id="favorites-grid">
                    <!-- Favorites rendered by JS -->
                </div>
                <div class="empty-state" id="empty-favorites" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                    <p>Нет избранных моделей</p>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-screen="catalog" onclick="navigateTo('catalog')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                </svg>
                <span>Каталог</span>
            </button>
            <button class="nav-item" data-screen="profile" onclick="navigateTo('profile')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Профиль</span>
            </button>
        </nav>

        <!-- Toast Container -->
        <div id="toast-container"></div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
